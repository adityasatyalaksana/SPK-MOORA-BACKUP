<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: white;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <svg width="900" height="1160" style="background-color: white; font-family: 'Arial', sans-serif;">
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
        <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#000" />
      </marker>
    </defs>

    <!-- Column Grid Lines -->
    <line x1="300" y1="0" x2="300" y2="1160" stroke="#000" stroke-width="1.5" />
    <line x1="600" y1="0" x2="600" y2="1160" stroke="#000" stroke-width="1.5" />
    <line x1="0" y1="45" x2="900" y2="45" stroke="#000" stroke-width="1.5" />

    <!-- Headers -->
    <text x="150" y="30" font-size="16" font-weight="bold" text-anchor="middle">Admin</text>
    <text x="450" y="30" font-size="16" font-weight="bold" text-anchor="middle">Sistem</text>
    <text x="750" y="30" font-size="16" font-weight="bold" text-anchor="middle">Pendaki</text>

    <!-- Start Node -->
    <circle cx="450" cy="75" r="10" fill="#000" />
    <line x1="450" y1="85" x2="450" y2="115" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)" />

    <!-- Top Fork Bar -->
    <rect x="150" y="115" width="650" height="8" fill="#000" />

    <!-- Fork arrows to Login Admin & Akses Web -->
    <line x1="200" y1="123" x2="200" y2="160" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)" />
    <line x1="700" y1="123" x2="700" y2="160" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)" />

    <!-- Admin: Login Box -->
    <rect x="100" y="160" width="200" height="45" rx="10" fill="#fff" stroke="#000" stroke-width="1.5" />
    <text x="200" y="187" font-size="13" text-anchor="middle">Login Sistem</text>

    <!-- Pendaki: Akses Halaman Utama Box -->
    <rect x="600" y="160" width="200" height="45" rx="10" fill="#fff" stroke="#000" stroke-width="1.5" />
    <text x="700" y="187" font-size="13" text-anchor="middle">Akses Halaman Utama</text>

    <!-- Admin: Login to Validate (Sistem) -->
    <path d="M 200 205 L 200 230 L 450 230 L 450 250" fill="none" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)" />

    <!-- Sistem: Validate Diamond -->
    <polygon points="450,250 490,272.5 450,295 410,272.5" fill="#fff" stroke="#000" stroke-width="1.5" />
    <text x="450" y="277" font-size="11" text-anchor="middle">Valid?</text>

    <!-- Admin: Validation loops -->
    <!-- Tidak Loop -->
    <path d="M 410 272.5 L 70 272.5 L 70 182.5 L 100 182.5" fill="none" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)" />
    <text x="50" y="260" font-size="11" font-weight="bold">Tidak</text>

    <!-- Ya to Dashboard -->
    <line x1="450" y1="295" x2="450" y2="335" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)" />
    <text x="458" y="315" font-size="11" font-weight="bold">Ya</text>

    <!-- Sistem: Menampilkan Dashboard Box -->
    <rect x="350" y="335" width="200" height="45" rx="10" fill="#fff" stroke="#000" stroke-width="1.5" />
    <text x="450" y="362" font-size="13" text-anchor="middle">Menampilkan Dashboard</text>

    <!-- Admin: Dashboard to Vertical Fork Admin -->
    <path d="M 350 357.5 L 80 357.5 L 80 415" fill="none" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)" />

    <!-- Admin: Vertical Fork Bar -->
    <rect x="76" y="415" width="8" height="530" fill="#000" />

    <!-- Admin: Actions Stack -->
    <!-- Mengelola Data Master -->
    <rect x="110" y="415" width="170" height="38" rx="8" fill="#fff" stroke="#000" stroke-width="1.2" />
    <text x="195" y="438" font-size="11" text-anchor="middle">Mengelola Data Master</text>
    <line x1="84" y1="434" x2="110" y2="434" stroke="#000" stroke-width="1.2" marker-end="url(#arrow)" />

    <!-- Mengelola Kriteria & Sub-Kriteria -->
    <rect x="110" y="480" width="170" height="38" rx="8" fill="#fff" stroke="#000" stroke-width="1.2" />
    <text x="195" y="503" font-size="11" text-anchor="middle">Mengelola Kriteria & Sub-Kriteria</text>
    <line x1="84" y1="499" x2="110" y2="499" stroke="#000" stroke-width="1.2" marker-end="url(#arrow)" />

    <!-- Menginput Penilaian Alternatif -->
    <rect x="110" y="545" width="170" height="38" rx="8" fill="#fff" stroke="#000" stroke-width="1.2" />
    <text x="195" y="568" font-size="11" text-anchor="middle">Menginput Penilaian Alternatif</text>
    <line x1="84" y1="564" x2="110" y2="564" stroke="#000" stroke-width="1.2" marker-end="url(#arrow)" />

    <!-- Menampilkan Perhitungan MOORA -->
    <rect x="110" y="610" width="170" height="38" rx="8" fill="#fff" stroke="#000" stroke-width="1.2" />
    <text x="195" y="633" font-size="11" text-anchor="middle">Menampilkan Perhitungan MOORA</text>
    <line x1="84" y1="629" x2="110" y2="629" stroke="#000" stroke-width="1.2" marker-end="url(#arrow)" />

    <!-- Mengelola Data User -->
    <rect x="110" y="675" width="170" height="38" rx="8" fill="#fff" stroke="#000" stroke-width="1.2" />
    <text x="195" y="698" font-size="11" text-anchor="middle">Mengelola Data User</text>
    <line x1="84" y1="694" x2="110" y2="694" stroke="#000" stroke-width="1.2" marker-end="url(#arrow)" />

    <!-- Melihat Log Aktivitas -->
    <rect x="110" y="740" width="170" height="38" rx="8" fill="#fff" stroke="#000" stroke-width="1.2" />
    <text x="195" y="763" font-size="11" text-anchor="middle">Melihat Log Aktivitas</text>
    <line x1="84" y1="759" x2="110" y2="759" stroke="#000" stroke-width="1.2" marker-end="url(#arrow)" />

    <!-- Logout -->
    <rect x="110" y="805" width="170" height="38" rx="8" fill="#fff" stroke="#000" stroke-width="1.2" />
    <text x="195" y="828" font-size="11" text-anchor="middle">Logout</text>
    <line x1="84" y1="824" x2="110" y2="824" stroke="#000" stroke-width="1.2" marker-end="url(#arrow)" />

    <!-- Admin: Logout to bottom Join Bar -->
    <path d="M 195 843 L 195 1020" fill="none" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)" />


    <!-- Pendaki: Akses to Vertical Fork Pendaki -->
    <path d="M 700 205 L 700 230 L 620 230 L 620 260" fill="none" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)" />

    <!-- Pendaki: Vertical Fork Bar -->
    <rect x="616" y="260" width="8" height="460" fill="#000" />

    <!-- Pendaki: Actions Stack -->
    <!-- Membuka Halaman Cari Rekomendasi -->
    <rect x="650" y="260" width="220" height="38" rx="8" fill="#fff" stroke="#000" stroke-width="1.2" />
    <text x="760" y="283" font-size="11" text-anchor="middle">Membuka Halaman Cari Rekomendasi</text>
    <line x1="624" y1="279" x2="650" y2="279" stroke="#000" stroke-width="1.2" marker-end="url(#arrow)" />

    <!-- Melihat Profil Gunung -->
    <rect x="650" y="325" width="220" height="38" rx="8" fill="#fff" stroke="#000" stroke-width="1.2" />
    <text x="760" y="348" font-size="11" text-anchor="middle">Melihat Profil Gunung</text>
    <line x1="624" y1="344" x2="650" y2="344" stroke="#000" stroke-width="1.2" marker-end="url(#arrow)" />

    <!-- Menginput Budget & Parameter -->
    <rect x="650" y="390" width="220" height="38" rx="8" fill="#fff" stroke="#000" stroke-width="1.2" />
    <text x="760" y="413" font-size="11" text-anchor="middle">Menginput Budget & Parameter</text>
    <line x1="624" y1="409" x2="650" y2="409" stroke="#000" stroke-width="1.2" marker-end="url(#arrow)" />

    <!-- Menampilkan Rekomendasi Terurut -->
    <rect x="650" y="455" width="220" height="38" rx="8" fill="#fff" stroke="#000" stroke-width="1.2" />
    <text x="760" y="478" font-size="11" text-anchor="middle">Menampilkan Rekomendasi Terurut</text>
    <line x1="624" y1="474" x2="650" y2="474" stroke="#000" stroke-width="1.2" marker-end="url(#arrow)" />

    <!-- Mencetak Rincian Biaya PDF -->
    <rect x="650" y="520" width="220" height="38" rx="8" fill="#fff" stroke="#000" stroke-width="1.2" />
    <text x="760" y="543" font-size="11" text-anchor="middle">Mencetak Rincian Biaya PDF</text>
    <line x1="624" y1="539" x2="650" y2="539" stroke="#000" stroke-width="1.2" marker-end="url(#arrow)" />

    <!-- Keluar -->
    <rect x="650" y="585" width="220" height="38" rx="8" fill="#fff" stroke="#000" stroke-width="1.2" />
    <text x="760" y="608" font-size="11" text-anchor="middle">Keluar</text>
    <line x1="624" y1="604" x2="650" y2="604" stroke="#000" stroke-width="1.2" marker-end="url(#arrow)" />

    <!-- Pendaki: Keluar to bottom Join Bar -->
    <path d="M 760 623 L 760 1020" fill="none" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)" />


    <!-- Bottom Join Bar -->
    <rect x="150" y="1020" width="650" height="8" fill="#000" />

    <!-- Join to Selesai (Sistem) -->
    <line x1="450" y1="1028" x2="450" y2="1076" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)" />

    <!-- End Node -->
    <circle cx="450" cy="1090" r="14" fill="none" stroke="#000" stroke-width="2" />
    <circle cx="450" cy="1090" r="8" fill="#000" />
  </svg>
</body>
</html>
